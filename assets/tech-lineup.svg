  <g transform="translate(300,290)">
    <circle r="34" fill="#161b22" stroke="#facc15" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=python" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#facc15"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">CM</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">Python</text>
  </g>

