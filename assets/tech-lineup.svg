    <image href="https://skillicons.dev/icons?i=sqlite" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#60a5fa"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">LB</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">SQLite</text>
  </g>

