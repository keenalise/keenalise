  <g transform="translate(340,470)">
    <circle r="34" fill="#161b22" stroke="#60a5fa" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=mysql" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#60a5fa"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">CB</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">MySQL</text>
  </g>

  <!-- CB Firebase -->
  <g transform="translate(560,470)">
    <circle r="34" fill="#161b22" stroke="#60a5fa" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=firebase" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#60a5fa"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">CB</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">Firebase</text>
  </g>

  <!-- RB Android -->
  <g transform="translate(750,440)">
    <circle r="34" fill="#161b22" stroke="#60a5fa" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=android" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#60a5fa"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">RB</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">Android</text>
  </g>

  <!-- GK -->
  <g transform="translate(450,560)">
    <circle r="34" fill="#161b22" stroke="#f97316" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=git" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#f97316"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">GK</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">Git</text>
  </g>

  <!-- Manager badge -->
  <g transform="translate(120,610)">
    <circle r="18" fill="#161b22" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"/>
    <image href="https://skillicons.dev/icons?i=github" x="-11" y="-11" width="22" height="22"/>
  </g>
  <text x="150" y="616" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff" opacity="0.85">Manager: GitHub</text>
