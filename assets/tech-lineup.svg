    <circle r="36" fill="#161b22" stroke="#facc15" stroke-width="3"/>
    <image href="https://skillicons.dev/icons?i=java" x="-21" y="-21" width="42" height="42"/>
    <rect x="-26" y="42" width="52" height="18" rx="4" fill="#facc15"/>
    <text x="0" y="55" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">CAM</text>
    <text x="0" y="78" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">Java</text>
    <text x="0" y="-46" text-anchor="middle" font-family="Verdana, sans-serif" font-size="10" font-weight="bold" fill="#facc15">★ CAPTAIN</text>
  </g>

  <!-- CM Kotlin (right) -->
  <g transform="translate(600,290)">
    <circle r="34" fill="#161b22" stroke="#facc15" stroke-width="2.5"/>
    <image href="https://skillicons.dev/icons?i=kotlin" x="-20" y="-20" width="40" height="40"/>
    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#facc15"/>
