    <rect x="-24" y="40" width="48" height="18" rx="4" fill="#a78bfa"/>
    <text x="0" y="53" text-anchor="middle" font-family="Verdana, sans-serif" font-size="11" font-weight="bold" fill="#0d1117">RW</text>
    <text x="0" y="76" text-anchor="middle" font-family="Verdana, sans-serif" font-size="13" fill="#ffffff">CSS</text>
  </g>

